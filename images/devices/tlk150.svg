<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160" role="img" aria-label="Motorola TLK 150 車載機">
  <defs>
    <linearGradient id="tlk150Body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2a42"/>
      <stop offset="1" stop-color="#0b1523"/>
    </linearGradient>
  </defs>
  <!-- mount bracket -->
  <rect x="20" y="14" width="200" height="6" rx="2" fill="#12202f"/>
  <!-- main body -->
  <rect x="14" y="22" width="212" height="118" rx="8" fill="url(#tlk150Body)" stroke="#2c3e55" stroke-width="1.2"/>
  <!-- display -->
  <rect x="26" y="34" width="120" height="50" rx="4" fill="#0a1828"/>
  <text x="34" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#e8a020" font-weight="700">CH 01</text>
  <text x="34" y="68" font-family="system-ui, sans-serif" font-size="7" fill="rgba(208,228,255,0.7)">DISPATCH 指令</text>
  <circle cx="138" cy="48" r="2.4" fill="#4cff7a"/>
  <!-- knobs -->
  <circle cx="170" cy="50" r="14" fill="#1a2638" stroke="#2c3e55" stroke-width="1.2"/>
  <circle cx="170" cy="50" r="6" fill="#0a101a"/>
  <circle cx="202" cy="50" r="14" fill="#1a2638" stroke="#2c3e55" stroke-width="1.2"/>
  <circle cx="202" cy="50" r="6" fill="#0a101a"/>
  <!-- keypad row -->
  <g fill="#1a2638" stroke="#2c3e55">
    <rect x="26" y="98" width="30" height="28" rx="3"/>
    <rect x="60" y="98" width="30" height="28" rx="3"/>
    <rect x="94" y="98" width="30" height="28" rx="3"/>
    <rect x="128" y="98" width="30" height="28" rx="3"/>
    <rect x="162" y="98" width="30" height="28" rx="3"/>
    <rect x="196" y="98" width="20" height="28" rx="3" fill="#e8a020" stroke="#b87e12"/>
  </g>
  <text x="206" y="116" font-family="system-ui, sans-serif" font-size="6" fill="#0b1523" font-weight="800" text-anchor="middle">PTT</text>
  <!-- mic cord -->
  <path d="M120 140 Q 115 148 105 150" stroke="#151f2e" stroke-width="2" fill="none"/>
</svg>
