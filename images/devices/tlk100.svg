<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 220" width="140" height="220" role="img" aria-label="Motorola TLK 100">
  <defs>
    <linearGradient id="tlkBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22324a"/>
      <stop offset="1" stop-color="#0c1626"/>
    </linearGradient>
  </defs>
  <!-- antenna -->
  <rect x="34" y="4" width="10" height="26" rx="4" fill="#0b1524" stroke="#2c3e55"/>
  <!-- main body -->
  <rect x="16" y="28" width="108" height="184" rx="14" fill="url(#tlkBody)" stroke="#2c3e55" stroke-width="1.2"/>
  <!-- top display -->
  <rect x="28" y="42" width="84" height="44" rx="4" fill="#0a1828"/>
  <g stroke="rgba(232,160,32,0.45)" stroke-width="1" fill="none">
    <rect x="34" y="50" width="72" height="4" rx="1"/>
  </g>
  <circle cx="36" cy="62" r="2" fill="#4cff7a"/>
  <text x="42" y="65" font-family="system-ui, sans-serif" font-size="6" fill="#d0e4ff" font-weight="600">GROUP 01</text>
  <text x="42" y="76" font-family="system-ui, sans-serif" font-size="5" fill="rgba(208,228,255,.55)">ONLINE</text>
  <!-- big PTT button -->
  <rect x="8" y="94" width="14" height="52" rx="4" fill="#e8a020" stroke="#b87e12"/>
  <!-- rotary knobs (top) -->
  <circle cx="30" cy="20" r="7" fill="#1a2638" stroke="#2c3e55"/>
  <circle cx="110" cy="20" r="7" fill="#1a2638" stroke="#2c3e55"/>
  <!-- keypad grid -->
  <g fill="#1a2638" stroke="#2c3e55">
    <rect x="32" y="100" width="22" height="18" rx="3"/>
    <rect x="58" y="100" width="22" height="18" rx="3"/>
    <rect x="84" y="100" width="22" height="18" rx="3"/>
    <rect x="32" y="122" width="22" height="18" rx="3"/>
    <rect x="58" y="122" width="22" height="18" rx="3"/>
    <rect x="84" y="122" width="22" height="18" rx="3"/>
    <rect x="32" y="144" width="22" height="18" rx="3"/>
    <rect x="58" y="144" width="22" height="18" rx="3"/>
    <rect x="84" y="144" width="22" height="18" rx="3"/>
    <rect x="32" y="166" width="22" height="18" rx="3"/>
    <rect x="58" y="166" width="22" height="18" rx="3"/>
    <rect x="84" y="166" width="22" height="18" rx="3"/>
  </g>
  <!-- speaker grille -->
  <g fill="rgba(255,255,255,0.18)">
    <rect x="42" y="192" width="56" height="2" rx="1"/>
    <rect x="42" y="198" width="56" height="2" rx="1"/>
    <rect x="42" y="204" width="56" height="2" rx="1"/>
  </g>
</svg>
